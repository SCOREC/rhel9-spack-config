# This is a Spack Environment file.
#
# It describes a set of packages to be installed, along with
# configuration settings.
spack:
  # add package specs to the `specs` list
  view: false
  concretizer:
    unify: false
    reuse: false
    targets:
      granularity: generic
  config:
    install_tree:
      root: /opt/scorec/spack/rhel9/v0222_2/install
    misc_cache: /opt/scorec/spack/rhel9/v0222_2/misc_cache
    build_stage:
    - /space/cwsmith/spack/rhel9/v0222_2/build_stage
    allow_sgid: false
  packages:
    all:
      providers:
        mpi: [mpich]
  modules:
    default:
      roots:
        lmod: /opt/scorec/spack/rhel9/v0222_2/lmod
      lmod:
        core_compilers:
        - gcc@=11.4.1
        hierarchy:
        - mpi
        projections:
          all: '{name}/{version}'
          ^simmetrix-simmodsuite: '{name}/{version}-simmodsuite-{^simmetrix-simmodsuite.version}'
        pumi:
          suffixes:
            ^metis+int64: int64
            ^metis~int64: int32
            +shared: shared
            +int64: mdsIdLong
        hdf5:
          suffixes:
            +cxx: cxx
        simmetrix-simmodsuite:
          environment:
            set:
              SIM_LICENSE_FILE: /net/common/meshSim/license/license.txt
              '{name}_ROOT': '{prefix}'
        all:
          environment:
            set:
              '{name}_RHEL9_ROOT': '{prefix}'
  compilers:
  - compiler:
      spec: gcc@=11.4.1
      paths:
        cc: /usr/bin/gcc
        cxx: /usr/bin/g++
        f77: /usr/bin/gfortran
        fc: /usr/bin/gfortran
      flags: {}
      operating_system: rhel9
      target: x86_64
      modules: []
      environment: {}
      extra_rpaths: []
  - compiler:
      spec: gcc@=13.2.0
      paths:
        cc: /opt/scorec/spack/rhel9/v0222_2/install/linux-rhel9-x86_64_v3/gcc-11.4.1/gcc-13.2.0-4eahhasudvnzuezpebbcnazmygyererp/bin/gcc
        cxx: /opt/scorec/spack/rhel9/v0222_2/install/linux-rhel9-x86_64_v3/gcc-11.4.1/gcc-13.2.0-4eahhasudvnzuezpebbcnazmygyererp/bin/g++
        f77: /opt/scorec/spack/rhel9/v0222_2/install/linux-rhel9-x86_64_v3/gcc-11.4.1/gcc-13.2.0-4eahhasudvnzuezpebbcnazmygyererp/bin/gfortran
        fc: /opt/scorec/spack/rhel9/v0222_2/install/linux-rhel9-x86_64_v3/gcc-11.4.1/gcc-13.2.0-4eahhasudvnzuezpebbcnazmygyererp/bin/gfortran
      flags: {}
